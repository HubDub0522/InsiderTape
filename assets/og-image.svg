<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1526"/>
      <stop offset="1" stop-color="#122740"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.80" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#3a6ea5" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- radar rings (echoing the favicon), right side -->
  <g transform="translate(915,300)" fill="none" stroke="#00d4ff" stroke-width="1.6">
    <circle r="230" stroke-opacity="0.08"/>
    <circle r="175" stroke-opacity="0.12"/>
    <circle r="118" stroke-opacity="0.18"/>
    <circle r="62"  stroke-opacity="0.28"/>
    <line x1="-235" y1="0" x2="235" y2="0" stroke-opacity="0.08"/>
    <line x1="0" y1="-235" x2="0" y2="235" stroke-opacity="0.08"/>
    <!-- sweep to a detected signal -->
    <path d="M0 0 L168 -122" stroke="#00d4ff" stroke-opacity="0.95" stroke-width="3.5" stroke-linecap="round"/>
    <circle r="7" fill="#00d4ff" stroke="none"/>
    <circle cx="168" cy="-122" r="17" fill="#00d4ff" fill-opacity="0.20" stroke="#00d4ff" stroke-opacity="0.95" stroke-width="2.5"/>
  </g>

  <!-- candlestick + insider-buy motif along the bottom -->
  <g transform="translate(84,470)">
    <!-- red candles -->
    <g stroke="#ff5470" stroke-width="7">
      <line x1="0"   y1="-6"  x2="0"   y2="40"/><rect x="-9"  y="0"  width="18" height="30" fill="#ff5470" rx="2" stroke="none"/>
      <line x1="46"  y1="2"   x2="46"  y2="52"/><rect x="37"  y="10" width="18" height="30" fill="#ff5470" rx="2" stroke="none"/>
      <line x1="92"  y1="8"   x2="92"  y2="60"/><rect x="83"  y="18" width="18" height="28" fill="#ff5470" rx="2" stroke="none"/>
      <line x1="138" y1="14"  x2="138" y2="66"/><rect x="129" y="26" width="18" height="26" fill="#ff5470" rx="2" stroke="none"/>
    </g>
    <!-- green candles + insider buy circle -->
    <g stroke="#29d17f" stroke-width="7">
      <line x1="184" y1="4"  x2="184" y2="58"/><rect x="175" y="14" width="18" height="30" fill="#29d17f" rx="2" stroke="none"/>
      <!-- hero candle: the detected insider buy -->
      <line x1="272" y1="-58" x2="272" y2="94" stroke-width="10"/><rect x="255" y="-40" width="34" height="112" fill="#29d17f" rx="3" stroke="none"/>
    </g>
    <!-- signature: insider buy marker on the hero green candle -->
    <circle cx="272" cy="17" r="68" fill="#29d17f" fill-opacity="0.16" stroke="#29d17f" stroke-opacity="0.95" stroke-width="3.5"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="250" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="800" letter-spacing="3" fill="#f2f7fc">INSIDER<tspan fill="#00d4ff">TAPE</tspan></text>

  <!-- tagline -->
  <text x="84" y="312" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="500" fill="#cfe0f0">Insider trading, without the noise.</text>

  <!-- subtext -->
  <text x="84" y="360" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#89a2bb">Cluster buys  ·  First buys in years  ·  Pre-earnings insider trades</text>

  <!-- url -->
  <text x="84" y="588" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" letter-spacing="1" fill="#00d4ff">insidertape.com</text>
</svg>
