name: Daily SEC Ingestion

on:
  schedule:
    # Times are UTC and anchored to EDT (UTC-4); in winter (EST) they land ~1h later ET.
    - cron: '0 14 * * 1-5'    # ~10:00 AM ET  (30 min after open)
    - cron: '0 16 * * 1-5'    # ~12:00 PM ET
    - cron: '0 19 * * 1-5'    # ~3:00 PM ET
    - cron: '14 20 * * 1-5'   # ~4:14 PM ET   (just after close)
    - cron: '0 13 * * 0,6'    # ~9:00 AM ET   (once each weekend day)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to backfill'
        required: false
        default: '3'

# Never let two ingestion runs overlap — a new run cancels an in-progress one.
# Safe because inserts are idempotent (UNIQUE constraint + seen_filings dedup).
concurrency:
  group: sec-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run SEC Form 4 ingestion
        run: node daily-worker.js ${{ github.event.inputs.days_back || '3' }} backfill
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Pre-compute cached queries
        run: node scripts/precompute.js
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
          # Manual runs always do a FULL precompute (heavy aggregates + leaderboard),
          # regardless of time of day. Scheduled runs use the once-a-day hour gate.
          FORCE_FULL: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
