name: Daily SEC Ingestion

on:
  schedule:
    # Hourly during US market + after-hours filing window.
    # Times are UTC; the range covers ~8am-9pm ET across both EDT and EST.
    - cron: '0 12-23 * * 1-5'   # Mon-Fri, 12:00-23:00 UTC
    - cron: '0 0-2 * * 2-6'     # Tue-Sat, 00:00-02:00 UTC (prior evening ET)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to backfill'
        required: false
        default: '3'

# Never let two ingestion runs overlap — a new run cancels an in-progress one.
# Safe because inserts are idempotent (UNIQUE constraint + seen_filings dedup).
concurrency:
  group: sec-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run SEC Form 4 ingestion
        run: node daily-worker.js ${{ github.event.inputs.days_back || '3' }} backfill
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Pre-compute cached queries
        run: node scripts/precompute.js
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
