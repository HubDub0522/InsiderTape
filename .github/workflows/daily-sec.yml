name: Daily SEC Ingestion

on:
  schedule:
    # Runs 4× per weekday: 10am, 1pm, 4:30pm, and 9pm ET
    # (14:00, 17:00, 20:30, 01:00 UTC — covers market hours + after-hours filings)
    - cron: '0 14 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 20 * * 1-5'
    - cron: '0 1 * * 2-6'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to backfill'
        required: false
        default: '3'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SEC Form 4 ingestion
        run: node daily-worker.js ${{ github.event.inputs.days_back || '3' }} backfill
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
