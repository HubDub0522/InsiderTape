name: Quarterly Historical Sync

on:
  schedule:
    # Runs on the 20th of Feb, May, Aug, Nov — 45+ days after each quarter ends,
    # giving SEC time to publish the structured data ZIP.
    - cron: '0 6 20 2,5,8,11 *'
  workflow_dispatch:
    inputs:
      num_quarters:
        description: 'Number of quarters to sync'
        required: false
        default: '4'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quarterly sync
        run: node sync-worker.js ${{ github.event.inputs.num_quarters || '4' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
