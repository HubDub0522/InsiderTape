name: Congress Trades Ingestion

on:
  schedule:
    # Run daily at 10:00 AM ET (14:00 UTC) — after market open, filings usually posted by then
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year for backfill (e.g. 2021)'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run congress ingestion
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          IMPORT_SECRET: ${{ secrets.IMPORT_SECRET }}
          CONGRESS_START_YEAR: ${{ github.event.inputs.start_year || '' }}
        run: node congress-action.js
